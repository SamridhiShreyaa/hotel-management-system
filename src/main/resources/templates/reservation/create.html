<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Create Reservation</title>
</head>
<body style="font-family: Arial, sans-serif; background: #ffffff; margin: 24px;">
<h1>Create Reservation</h1>

<p th:if="${param.error}" th:text="${param.error}" style="color: #9a1b1b;"></p>

<form th:action="@{/reservations/create}" th:object="${reservationRequest}" method="post">
	<div><label>Guest ID:</label> <input type="number" th:field="*{guestId}" required></div>
	<br>
	<div><label>Room ID:</label> <input type="number" th:field="*{roomId}" required></div>
	<br>
	<div><label>Check-in:</label> <input type="date" th:field="*{checkInDate}" required></div>
	<br>
	<div><label>Check-out:</label> <input type="date" th:field="*{checkOutDate}" required></div>
	<br>
	<div><label>Guests:</label> <input type="number" min="1" th:field="*{numGuests}" value="1"></div>
	<br>
	<div><label>Special Requests:</label> <input type="text" th:field="*{specialRequests}"></div>
	<br>
	<button type="submit">Confirm Reservation</button>
</form>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login</title>
</head>
<body style="font-family: Arial, sans-serif; background: #ffffff; margin: 24px;">
<h1>Login</h1>

<p th:if="${param.error}" th:text="'Bad credentials'" style="color: #9a1b1b;"></p>
<p th:if="${param.registered}" th:text="'Registration successful. Please login.'" style="color: #0b6b2f;"></p>
<p th:if="${param.logout}" th:text="'You have been signed out.'" style="color: #0b6b2f;"></p>
<p th:if="${message}" th:text="${message}" style="color: #0b6b2f;"></p>

<form th:action="@{/auth/login}" method="post">
	<div>
		<label>Email:</label>
		<input type="email" name="email" required>
	</div>
	<br>
	<div>
		<label>Password:</label>
		<input type="password" name="password" required>
	</div>
	<br>
	<button type="submit">Login</button>
</form>

<p><a th:href="@{/auth/register}">New user? Register here</a></p>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Guest Registration</title>
</head>
<body style="font-family: Arial, sans-serif; background: #ffffff; margin: 24px;">
<h1>Guest Registration</h1>

<p th:if="${message}" th:text="${message}" style="color: #0b6b2f;"></p>

<form th:action="@{/auth/register}" th:object="${registerRequest}" method="post">
	<div>
		<label>Full Name:</label>
		<input type="text" th:field="*{fullName}" required>
	</div>
	<br>
	<div>
		<label>Email:</label>
		<input type="email" th:field="*{email}" required>
	</div>
	<br>
	<div>
		<label>Phone:</label>
		<input type="text" th:field="*{phone}">
	</div>
	<br>
	<div>
		<label>Address:</label>
		<input type="text" th:field="*{address}">
	</div>
	<br>
	<div>
		<label>Nationality:</label>
		<input type="text" th:field="*{nationality}">
	</div>
	<br>
	<div>
		<label>Identification Type:</label>
		<select th:field="*{idProofType}" required>
			<option value="">Select ID type</option>
			<option value="AADHAR">AADHAR</option>
			<option value="PASSPORT">PASSPORT</option>
			<option value="DRIVING_LICENSE">DRIVING_LICENSE</option>
			<option value="OTHER">OTHER</option>
		</select>
	</div>
	<br>
	<div>
		<label>Identification Number:</label>
		<input type="text" th:field="*{idProofNo}" required>
	</div>
	<br>
	<div>
		<label>Password:</label>
		<input type="password" th:field="*{password}" required>
	</div>
	<br>
	<button type="submit">Register</button>
</form>

<p>Already registered? <a th:href="@{/auth/login}">Login</a></p>
</body>
</html>

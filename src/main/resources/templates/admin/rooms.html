<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Manage Rooms')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Manage Rooms</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addRoomModal">
      <i class="bi bi-plus-circle"></i> Add Room
    </button>
  </div>

  <div class="table-responsive">
    <table class="table table-hover">
      <thead class="table-dark">
        <tr>
          <th>Room No.</th>
          <th>Type</th>
          <th>Price/Night</th>
          <th>Max Guests</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="room : ${rooms}">
          <td th:text="${room.roomNumber}"></td>

          <td th:text="${room.roomType.replace('_',' ')}"></td>

         <td th:text="|₹${room.pricePerNight}|"></td>

          <td th:text="${room.maxGuests}"></td>

          <!-- ✅ FIXED STATUS BADGE -->
          <td>
            <span
              th:class="'badge ' + (room.status == 'AVAILABLE' ? 'bg-success' : 
                                   (room.status == 'BOOKED' ? 'bg-warning text-dark' : 'bg-secondary'))"
              th:text="${room.status}">
            </span>
          </td>

          <td>
            <form th:action="@{/admin/rooms/delete/{id}(id=${room.id})}"
                  method="post"
                  th:data-room="${room.roomNumber}"
                  onsubmit="return confirm('Delete room ' + this.dataset.room + '?')">

              <button class="btn btn-sm btn-outline-danger">
                <i class="bi bi-trash"></i>
              </button>

            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Add Room Modal -->
<div class="modal fade" id="addRoomModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add New Room</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <form th:action="@{/admin/rooms/add}" method="post">
        <div class="modal-body row g-3">

          <div class="col-md-6">
            <label class="form-label">Room Number</label>
            <input type="text" name="roomNumber" class="form-control" required/>
          </div>

          <div class="col-md-6">
            <label class="form-label">Room Type</label>
            <select name="roomType" class="form-select" required>
              <option value="SINGLE">Single</option>
              <option value="DELUXE">Deluxe</option>
              <option value="DOUBLE_BED">Double Bed</option>
              <option value="SUITE">Suite</option>
              <option value="TWIN">Twin</option>
              <option value="FAMILY">Family</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Price per Night (₹)</label>
            <input type="number" name="price" class="form-control" min="0" required/>
          </div>

          <div class="col-md-6">
            <label class="form-label">Max Guests</label>
            <input type="number" name="maxGuests" class="form-control" value="2" min="1" max="10" required/>
          </div>

          <div class="col-12">
            <label class="form-label">Description</label>
            <input type="text" name="description" class="form-control"/>
          </div>

        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Room</button>
        </div>

      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

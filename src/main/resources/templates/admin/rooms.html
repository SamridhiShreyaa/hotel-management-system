<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Manage Rooms</title>
</head>
<body style="font-family: Arial, sans-serif; background: #ffffff; margin: 24px;">
<h1>Manage Rooms</h1>

<table border="1" cellpadding="8" cellspacing="0">
	<tr>
		<th>Hotel</th><th>Room</th><th>Type</th><th>Status</th>
	</tr>
	<tr th:each="room : ${rooms}">
		<td th:text="${room.hotelName}"></td>
		<td th:text="${room.roomNumber}"></td>
		<td th:text="${room.roomType}"></td>
		<td th:text="${room.status}"></td>
	</tr>
</table>

<p><a th:href="@{/admin/dashboard}">Back to dashboard</a></p>
</body>
</html>

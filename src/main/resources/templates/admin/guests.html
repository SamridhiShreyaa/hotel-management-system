<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Guest List')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">
  <h2 class="mb-4">Registered Guests</h2>
  <div class="table-responsive">
    <table class="table table-hover">
      <thead class="table-dark">
        <tr><th>ID</th><th>Username</th><th>Full Name</th><th>Email</th><th>Phone</th><th>City</th><th>State</th></tr>
      </thead>
      <tbody>
        <tr th:each="g : ${guests}">
          <td th:text="${g.id}"></td>
          <td th:text="${g.username}"></td>
          <td th:text="${g.fullName}"></td>
          <td th:text="${g.email}"></td>
          <td th:text="${g.phone}"></td>
          <td th:text="${g.city}"></td>
          <td th:text="${g.state}"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

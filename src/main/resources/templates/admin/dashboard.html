<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Admin Dashboard')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">
  <h2 class="mb-1">Admin Dashboard</h2>
  <p class="text-muted mb-4">Hotel overview and management</p>

  <!-- Stats row -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3 text-center">
        <div class="stat-icon">🏨</div>
        <div class="stat-value" th:text="${totalRooms}"></div>
        <div class="stat-label">Total Rooms</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3 text-center">
        <div class="stat-icon">✅</div>
        <div class="stat-value" th:text="${availableRooms}"></div>
        <div class="stat-label">Available</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3 text-center">
        <div class="stat-icon">📋</div>
        <div class="stat-value" th:text="${activeBookings}"></div>
        <div class="stat-label">Active Bookings</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card stat-card p-3 text-center">
        <div class="stat-icon">💰</div>
        <div class="stat-value">₹<span th:text="${totalRevenue}"></span></div>
        <div class="stat-label">Revenue</div>
      </div>
    </div>
  </div>

  <!-- Recent bookings -->
  <h5 class="mb-3">Recent Bookings</h5>
  <div class="table-responsive mb-4">
    <table class="table table-hover">
      <thead class="table-dark">
        <tr><th>ID</th><th>Guest</th><th>Room</th><th>Check-In</th><th>Check-Out</th><th>Amount</th><th>Status</th></tr>
      </thead>
      <tbody>
        <tr th:each="b : ${recentBookings}">
          <td th:text="'#' + ${b.id}"></td>
          <td th:text="${b.user.username}"></td>
          <td th:text="${b.room.roomNumber}"></td>
          <td th:text="${b.checkInDate}"></td>
          <td th:text="${b.checkOutDate}"></td>
          <td th:text="'₹' + ${b.totalAmount}"></td>
          <td>
            <span th:class="'badge ' + (b.status == 'BOOKED' ? 'bg-success' : (b.status == 'CANCELLED' ? 'bg-danger' : 'bg-secondary'))"
                  th:text="${b.status}"></span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Payment logs -->
  <h5 class="mb-3">Recent Payment Logs</h5>
  <div class="table-responsive">
    <table class="table table-hover">
      <thead class="table-dark">
        <tr><th>Log ID</th><th>Guest</th><th>Amount</th><th>Method</th><th>Date</th><th>Message</th></tr>
      </thead>
      <tbody>
        <tr th:each="p : ${paymentLogs}">
          <td th:text="${p.id}"></td>
          <td th:text="${p.user.username}"></td>
          <td th:text="'₹' + ${p.amount}"></td>
          <td th:text="${p.paymentMethod}"></td>
          <td th:text="${p.paymentDate}"></td>
          <td th:text="${p.logMessage}"></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('All Bookings')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <h2 class="mb-4">All Bookings</h2>
  <div class="table-responsive">
    <table class="table table-hover">
      <thead class="table-dark">
        <tr><th>ID</th><th>Guest</th><th>Room</th><th>Check-In</th><th>Check-Out</th><th>Amount</th><th>Status</th><th>Action</th></tr>
      </thead>
      <tbody>
        <tr th:each="b : ${bookings}">
          <td th:text="'#' + ${b.id}"></td>
          <td th:text="${b.user.username}"></td>
          <td th:text="${b.room.roomNumber}"></td>
          <td th:text="${b.checkInDate}"></td>
          <td th:text="${b.checkOutDate}"></td>
          <td th:text="'₹' + ${b.totalAmount}"></td>
          <td>
            <span th:class="'badge ' + (b.status == 'BOOKED' ? 'bg-success' : (b.status == 'CANCELLED' ? 'bg-danger' : 'bg-secondary'))"
                  th:text="${b.status}"></span>
          </td>
          <td th:if="${b.status == 'BOOKED'}">
            <form th:action="@{/admin/bookings/cancel/{id}(id=${b.id})}" method="post"
                  onsubmit="return confirm('Cancel booking #' + [[${b.id}]] + '?')">
              <button class="btn btn-sm btn-outline-danger">Cancel</button>
            </form>
          </td>
          <td th:unless="${b.status == 'BOOKED'}">—</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

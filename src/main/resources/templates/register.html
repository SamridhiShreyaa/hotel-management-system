<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Register')}"></head>
<body class="auth-page">

<div class="auth-wrapper">
  <div class="auth-card" style="max-width:520px">
    <div class="auth-logo">🏨</div>
    <h2>Create Account</h2>
    <p class="auth-sub">Join Grand Hotel</p>

    <div th:if="${error}"   class="alert alert-danger"  th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form th:action="@{/register}" method="post">
      <div class="row g-3 mb-3">
        <div class="col-12">
          <label class="form-label">Full Name</label>
          <input type="text" name="fullName" class="form-control" placeholder="Your full name" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Username" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="Email" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" name="phone" class="form-control" placeholder="Phone number"/>
        </div>
        <div class="col-md-6">
          <label class="form-label">City</label>
          <input type="text" name="city" class="form-control" placeholder="City"/>
        </div>
        <div class="col-12">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control"
                 placeholder="Minimum 6 characters" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Create Account</button>
    </form>

    <p class="mt-3 text-center text-muted">
      Already have an account? <a th:href="@{/signin}">Sign in</a>
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

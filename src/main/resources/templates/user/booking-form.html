<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Book Room')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

  <h2>Book Room</h2>

  <!-- Room Info -->
  <div class="card mb-4">
    <div class="card-body">
      <h5 th:text="${room.roomType}"></h5>
      <p><strong>Room No:</strong> <span th:text="${room.roomNumber}"></span></p>
      <p><strong>Price:</strong> ₹<span th:text="${room.pricePerNight}"></span>/night</p>
      <p><strong>Description:</strong> <span th:text="${room.description}"></span></p>
    </div>
  </div>

  <!-- Booking Form -->
  <form th:action="@{/user/book}" method="post">

    <input type="hidden" name="roomId" th:value="${room.id}" />

    <div class="mb-3">
      <label>Check-In Date</label>
      <input type="date" name="checkIn" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Check-Out Date</label>
      <input type="date" name="checkOut" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary">
      Confirm Booking
    </button>

  </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

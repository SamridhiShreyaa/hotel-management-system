<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Make Payment')}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4" style="max-width:520px">
  <a th:href="@{/user/my-bookings}" class="btn btn-sm btn-outline-secondary mb-3">← Back</a>
  <h3 class="mb-4">Make Payment</h3>

  <div class="card p-4 shadow-sm mb-4">
    <p class="mb-1">
      <strong>Room:</strong>
      <span th:text="${booking.room.roomNumber + ' (' + booking.room.roomType + ')'}"></span>
    </p>
    <p class="mb-1">
      <strong>Stay:</strong>
      <span th:text="${booking.checkInDate} + ' → ' + booking.checkOutDate"></span>
    </p>
    <hr/>
    <div class="text-center">
      <div class="fs-2 fw-bold text-success">₹<span th:text="${booking.totalAmount}"></span></div>
      <div class="text-muted small">Total Amount Due</div>
    </div>
  </div>

  <form th:action="@{/user/pay}" method="post">
    <input type="hidden" name="bookingId" th:value="${booking.id}"/>
    <div class="mb-4">
      <label class="form-label fw-semibold">Payment Method</label>
      <div class="d-flex flex-column gap-2">
        <label class="payment-option">
          <input type="radio" name="method" value="UPI" required/> 🔵 UPI
        </label>
        <label class="payment-option">
          <input type="radio" name="method" value="CARD"/> 💳 Credit / Debit Card
        </label>
        <label class="payment-option">
          <input type="radio" name="method" value="NET_BANKING"/> 🏦 Net Banking
        </label>
      </div>
    </div>
    <button type="submit" class="btn btn-success w-100 btn-lg">
      <i class="bi bi-check-circle"></i> Process Payment
    </button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

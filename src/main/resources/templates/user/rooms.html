<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('Available Rooms')}"></head>
<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

  <h2 class="mb-1">Available Rooms</h2>
  <p class="text-muted mb-4">Browse and book your perfect room.</p>

  <!-- Filter -->
  <form th:action="@{/user/rooms}" method="get" class="d-flex gap-2 mb-4">
    
    <select name="type" class="form-select w-auto">
      <option value="">All Types</option>
      <option value="SINGLE" th:selected="${selectedType == 'SINGLE'}">Single</option>
      <option value="DELUXE" th:selected="${selectedType == 'DELUXE'}">Deluxe</option>
      <option value="DOUBLE_BED" th:selected="${selectedType == 'DOUBLE_BED'}">Double Bed</option>
      <option value="SUITE" th:selected="${selectedType == 'SUITE'}">Suite</option>
      <option value="TWIN" th:selected="${selectedType == 'TWIN'}">Twin</option>
      <option value="FAMILY" th:selected="${selectedType == 'FAMILY'}">Family</option>
    </select>

    <button class="btn btn-primary" type="submit">Filter</button>
    <a th:href="@{/user/rooms}" class="btn btn-outline-secondary">Clear</a>

  </form>

  <!-- No rooms -->
  <div th:if="${rooms.isEmpty()}" class="alert alert-info">
    No available rooms for the selected type.
  </div>

  <!-- Room cards -->
  <div class="row g-4">

    <div class="col-md-6 col-lg-4" th:each="room : ${rooms}">
      
      <div class="card h-100">

        <!-- Header -->
        <div class="card-header d-flex justify-content-between">
          <span th:text="${room.roomType}"></span>
          <span th:text="${room.roomNumber}"></span>
        </div>

        <!-- Body -->
        <div class="card-body">

          <h5 th:text="${room.roomType.replace('_',' ')}"></h5>

          <p class="text-muted small"
             th:text="${room.description != null ? room.description : 'Comfortable room with modern amenities.'}">
          </p>

          <div class="d-flex justify-content-between mt-2">

            <!-- FIXED ₹ -->
            <span>
              <strong th:text="|₹${room.pricePerNight}|"></strong>
              <small>/night</small>
            </span>

            <span class="text-muted small">
              Max <span th:text="${room.maxGuests}"></span>
            </span>

          </div>

        </div>

        <!-- Footer -->
        <div class="card-footer bg-transparent">

          <!-- 🔥 IMPORTANT: This is CORRECT -->
          <a th:href="@{/user/book/{id}(id=${room.id})}"
             class="btn btn-primary w-100">
            Book Now
          </a>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
